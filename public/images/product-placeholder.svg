    <linearGradient id="gold" x2="1" y2="1"><stop stop-color="#f5e9d8"/><stop offset="1" stop-color="#d79b3a"/></linearGradient>
    <filter id="shadow"><feDropShadow dy="25" stdDeviation="22" flood-opacity=".5"/></filter>
